services:
  redis:
    image: redis:7-alpine

  turnstile:
    build: .
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis
    deploy:
      replicas: 2

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "50051:50051"
    depends_on:
      - turnstile
