services:
  redis:
    image: redis:7-alpine

  turnstile:
    build: .
    environment:
      - REDIS_ADDR=redis:6379
      - CONFIG_PATH=/config/config.yaml
    volumes:
      - ./config/config.yaml:/config/config.yaml:ro
    depends_on:
      - redis
    deploy:
      replicas: 3

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "50051:50051"
    depends_on:
      - turnstile
